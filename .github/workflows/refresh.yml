name: Refresh dashboard

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours (00, 04, 08, 12, 16, 20 UTC)
  workflow_dispatch: {}      # allow manual trigger from the Actions tab

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run refresh.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./refresh.sh

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html compare.html data/metrics.json data/snapshots.jsonl data/competitors/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto-refresh: $(date -u +%F)"
            git push || {
              echo "Push rejected — remote moved during this run. Pulling and retrying..."
              git pull --rebase origin main || {
                echo "Rebase conflict (concurrent auto-refresh likely). Skipping push; next cron will catch up."
                exit 0
              }
              git push
            }
          fi
